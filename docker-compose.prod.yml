# Produktion — starten mit: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
services:
  project:
    volumes: []

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    depends_on:
      - project
      - phpmyadmin

volumes:
  caddy_data: {}
  caddy_config: {}
